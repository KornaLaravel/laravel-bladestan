name: Code Analysis

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  code_analysis:
    strategy:
      fail-fast: false
      matrix:
        actions:
          - name: ECS
            run: vendor/bin/ecs
          - name: PHPStan
            run: vendor/bin/phpstan
          - name: Unit Tests
            run: vendor/bin/phpunit --coverage-clover=coverage.xml
            coverage: xdebug
          - name: Check Active Classes
            run: vendor/bin/class-leak check src --ansi --skip-type=TomasVotruba\\Bladestan\\ErrorReporting\\PHPStan\\ErrorFormatter\\BladeTemplateErrorFormatter --skip-type=Bladestan\\PHPStan\\BladeSignatureCacheMetaExtension

    name: ${{ matrix.actions.name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring

      - if: matrix.actions.name == 'Unit Tests'
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          coverage: xdebug

      - uses: ramsey/composer-install@v3

      - run: ${{ matrix.actions.run }}

      - name: Upload coverage reports to Codecov
        if: matrix.actions.name == 'Unit Tests'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml

  # Test the unstable Livewire output from older versions
  dependency_versions:
    name: Tests (PHP ${{ matrix.php }}, Livewire ${{ matrix.livewire }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.2"
            livewire: "^3.7"
            testbench: "^10.0"
          - php: "8.3"
            livewire: "^4.0"
            testbench: "^11.0"

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring

      # livewire is a runtime require, testbench a dev require; pin each in place.
      - run: composer require --no-update "livewire/livewire:${{ matrix.livewire }}"

      - run: composer require --no-update --dev "orchestra/testbench:${{ matrix.testbench }}"

      - run: composer update

      - run: vendor/bin/phpunit
